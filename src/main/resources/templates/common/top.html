<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/mypetstore.css}" type="text/css" media="screen"/>
</head>
<body>
<header th:fragment="header">
    <div id="Header">
        <div id="Logo">
            <div id="LogoContent">
                <a href="/catalog/index"><img src="../images/logo-topbar.gif"  alt=""/></a>
            </div>
        </div>

        <div id="Menu">
            <div id="MenuContent">
                <a href="/cart/viewCart"><img align="middle" name="img_cart" src="../images/cart.gif"  alt=""/></a>
                <img align="middle" src="../images/separator.gif" alt=""/>
                <a th:if="${session.loginAccount} == null" href="/account/signOnForm">Sign In</a>
                <a th:if="${session.loginAccount} != null" href="/account/viewAccount" th:text="${session.loginAccount.username}" ></a>
                <img th:if="${session.loginAccount} != null" align="middle" src="../images/separator.gif"  alt=""/>
<!--                <a th:if="(${session.account} != null) and (${!session.authenticated}) " href="/account/signOnForm">Sign In</a>-->
                <a th:if="${session.loginAccount} != null" href="/account/signOff">Sign Out</a>
                <img th:if="${session.loginAccount} != null" align="middle" src="../images/separator.gif"  alt=""/>
                <a th:if="${session.loginAccount} != null" href="/account/viewAccount">My Account</a>
                <img align="middle" src="../images/separator.gif"  alt=""/>
                <a href="../help.html">?</a>
            </div>
        </div>

        <div id="Search">
            <div id="SearchContent">
                <form action="/catalog/searchProducts" method="post">
                    <input type="text" name="keyword" size="14" />
                    <input type="submit" name="searchProducts" value="Search"/>
                </form>
            </div>
        </div>

        <div id="QuickLinks">
            <a href="/catalog/viewCategory?categoryId=FISH"><img src="../images/sm_fish.gif"  alt=""/></a>
            <img src="../images/separator.gif"  alt=""/>
            <a href="/catalog/viewCategory?categoryId=DOGS"><img src="../images/sm_dogs.gif"  alt=""/></a>
            <img src="../images/separator.gif"  alt=""/>
            <a href="/catalog/viewCategory?categoryId=REPTILES"><img src="../images/sm_reptiles.gif"  alt=""/></a>
            <img src="../images/separator.gif"  alt=""/>
            <a href="/catalog/viewCategory?categoryId=CATS"><img src="../images/sm_cats.gif"  alt=""/></a>
            <img src="../images/separator.gif"  alt=""/>
            <a href="/catalog/viewCategory?categoryId=BIRDS"><img src="../images/sm_birds.gif"  alt=""/></a>
        </div>
    </div>
</header>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/mypetstore.css}" type="text/css" media="screen"/>
</head>
<body>
<footer th:fragment="footer">
    <div id="Footer">

        <div id="PoweredBy">
            &nbsp<a href="http://www.csu.edu.cn">Central South University</a>
        </div>

        <div id="Banner">
            <label th:if="${session.loginAccount} != null">
                <img th:if="${session.loginAccount.bannerOption}"

            </label>
        </div>

    </div>
</footer>
</body>
</html>
